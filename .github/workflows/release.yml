name: Build TigerBeetle for Debian

on:
  workflow_dispatch:
    inputs:
      tigerbeetle_version:
        description: The version of TigerBeetle to build.
        type: string
        required: true
      tigerbeetle_release_suffix:
        description: The upstream release suffix (optional). Leave empty if not needed.
        type: string
        required: false
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, arm64, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'arm64'

permissions:
  contents: write

jobs:
  build-tigerbeetle:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tigerbeetle-debian
        uses: actions/checkout@v4

      - name: Build TigerBeetle
        run: ./build.sh ${{ inputs.tigerbeetle_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: tigerbeetle_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tigerbeetle-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.tigerbeetle_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            tigerbeetle_*.dsc
            tigerbeetle_*.orig.tar.gz
            tigerbeetle_*.debian.tar.xz

  release-tigerbeetle:
    name: Release TigerBeetle for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-tigerbeetle, build-src]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            tigerbeetle_*.deb
            tigerbeetle_*.dsc
            tigerbeetle_*.orig.tar.gz
            tigerbeetle_*.debian.tar.xz
          name: ${{ inputs.tigerbeetle_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.tigerbeetle_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
